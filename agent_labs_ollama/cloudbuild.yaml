steps:
# Build the unified container image (frontend + backend)
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/agent-labs', '.']

# Push the unified container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/agent-labs']

# Deploy unified container image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'agent-labs'
  - '--image'
  - 'gcr.io/$PROJECT_ID/agent-labs'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--port'
  - '8080'
  - '--memory'
  - '4Gi'
  - '--cpu'
  - '2'
  - '--timeout'
  - '900'
  - '--concurrency'
  - '10'
  - '--max-instances'
  - '10'

images:
- 'gcr.io/$PROJECT_ID/agent-labs'
