steps:
# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/agent-labs-ollama-backend', './backend']

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/agent-labs-ollama-backend']

# Deploy container image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'agent-labs-ollama-backend'
  - '--image'
  - 'gcr.io/$PROJECT_ID/agent-labs-ollama-backend'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'OLLAMA_BASE_URL=http://<your-ollama-service-url>'

images:
- 'gcr.io/$PROJECT_ID/agent-labs-ollama-backend'
