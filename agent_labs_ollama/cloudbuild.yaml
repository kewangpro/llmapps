steps:
# Build the backend container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/agent-labs-ollama-backend', './backend']

# Push the backend container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/agent-labs-ollama-backend']

# Deploy backend container image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'agent-labs-ollama-backend'
  - '--image'
  - 'gcr.io/$PROJECT_ID/agent-labs-ollama-backend'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'OLLAMA_BASE_URL=http://<your-ollama-service-url>'

# Build the frontend container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/agent-labs-ollama-frontend', './frontend']

# Push the frontend container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/agent-labs-ollama-frontend']

# Deploy frontend container image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'agent-labs-ollama-frontend'
  - '--image'
  - 'gcr.io/$PROJECT_ID/agent-labs-ollama-frontend'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'NEXT_PUBLIC_API_BASE_URL=https://agent-labs-ollama-backend-851143938786.us-central1.run.app'

images:
- 'gcr.io/$PROJECT_ID/agent-labs-ollama-backend'
- 'gcr.io/$PROJECT_ID/agent-labs-ollama-frontend'
