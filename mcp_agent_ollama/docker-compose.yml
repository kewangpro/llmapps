version: '3.8'

services:
  agent-labs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PORT=3000
    depends_on:
      - ollama
    volumes:
      - ./backend:/app/backend
      - ./tools:/app/tools
      - ./data:/app/data
      - ./main.py:/app/main.py

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0

volumes:
  ollama_data: